[pytest]
testpaths = tests
addopts = -ra --tb=short --strict-markers --cov=metbit --cov-fail-under=48
markers =
    slow: slow tests
    integration: integration tests
    perf: performance regression tests (run with -m perf)
filterwarnings =
    ignore:Conversion of an array with ndim > 0 to a scalar:DeprecationWarning:numpy\.ma\.extras
    ignore:invalid value encountered in divide:RuntimeWarning:metbit\.preprocessing\.normalize
